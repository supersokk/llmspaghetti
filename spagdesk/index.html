<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SpagDesk</title>
<!-- PWA: tap-to-home-screen app. manifest.json (not .webmanifest) so Caddy serves
     it as application/json, which Chrome accepts — no Caddyfile MIME change. -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpagDesk">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<style>
  :root{
    --bg:#0d1117; --surface:#161b22; --surface2:#1c2230; --border:#30363d;
    --accent:#2f81f7; --accent2:#58a6ff; --green:#3fb950; --yellow:#d29922;
    --red:#f85149; --purple:#bc8cff; --text:#e6edf3; --dim:#8b949e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    display:flex;flex-direction:column;overflow:hidden;
    height:100vh;height:100dvh}   /* dvh excludes the mobile browser chrome (100vh doesn't) */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  header{display:flex;align-items:center;gap:.7rem;padding:0 1.25rem;height:54px;
    background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
    position:relative}
  header .spacer{flex:1}
  header .logo{font-size:1.15rem;font-weight:800;letter-spacing:.02em;flex-shrink:0}
  header .sub{font-size:.78rem;color:var(--dim);flex-shrink:0}
  header .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
  header .status{font-size:.75rem;color:var(--dim);flex-shrink:0;white-space:nowrap}
  /* On narrower screens, drop the subtitle so the mode bar keeps room to breathe. */
  @media(max-width:900px){ header .sub{display:none} }

  main{flex:1;display:flex;min-height:0}

  /* Left rail — conversation history (persisted in localStorage). */
  #sidebar{width:230px;flex-shrink:0;background:var(--surface);
    border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
  #sidebar .side-head{display:flex;align-items:center;justify-content:space-between;
    padding:.9rem 1rem .6rem;font-size:.7rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.06em;color:var(--dim)}
  #sidebar .side-new{background:var(--accent);color:#fff;border:none;border-radius:6px;
    font-size:.74rem;font-weight:600;padding:.25rem .55rem;cursor:pointer;font-family:inherit}
  #convo-list{flex:1;overflow-y:auto;padding:.25rem .5rem .75rem}
  .convo-item{display:flex;align-items:center;gap:.4rem;padding:.5rem .55rem;
    border-radius:7px;cursor:pointer;margin-bottom:.15rem}
  .convo-item:hover{background:var(--bg)}
  .convo-item.active{background:rgba(47,129,247,.14);outline:1px solid rgba(47,129,247,.3)}
  .convo-item .ci-body{flex:1;min-width:0}
  .convo-item .ci-title{font-size:.82rem;color:var(--text);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .convo-item .ci-time{font-size:.68rem;color:var(--dim)}
  .convo-item .ci-del{opacity:0;background:transparent;border:none;color:var(--dim);
    cursor:pointer;font-size:.85rem;padding:.1rem .25rem;flex-shrink:0}
  .convo-item:hover .ci-del{opacity:1}
  .convo-item .ci-del:hover{color:var(--red)}
  .convo-empty{color:var(--dim);font-size:.78rem;line-height:1.5;padding:.6rem}
  /* Collapsible rails (☰ / ›). State persisted; on mobile the left rail slides
     over the chat instead of squeezing it. */
  body.hide-left #sidebar{display:none}
  body.hide-right aside{display:none}
  .railtoggle{background:transparent;border:1px solid var(--border);color:var(--dim);
    border-radius:6px;font-size:1rem;line-height:1;padding:.2rem .5rem;cursor:pointer;
    flex-shrink:0}
  .railtoggle:hover{color:var(--text);border-color:var(--accent)}
  aside .aside-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
  aside .aside-collapse{background:transparent;border:none;color:var(--dim);cursor:pointer;
    font-size:.9rem;padding:0 .2rem}
  aside .aside-collapse:hover{color:var(--text)}
  /* On mobile the left rail floats over the chat (JS defaults it closed there);
     the right panel is hidden on mobile, so its ◧ toggle is hidden too. */
  @media(max-width:720px){
    #sidebar{position:fixed;left:0;top:54px;bottom:0;z-index:40;
      box-shadow:2px 0 16px rgba(0,0,0,.5)}
    #toggle-right2{display:none}
  }

  #transcript{flex:1;overflow-y:auto;padding:1.5rem;display:flex;
    flex-direction:column;gap:1.1rem}
  #transcript .empty{margin:auto;text-align:center;color:var(--dim);max-width:420px}
  #transcript .empty .big{font-size:2.4rem;margin-bottom:.5rem}

  .msg{max-width:820px;width:100%;margin:0 auto}
  .msg .who{font-size:.7rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.06em;color:var(--dim);margin-bottom:.35rem}
  .msg.user .who{color:var(--accent2)}
  .bubble{background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:.85rem 1.1rem;white-space:pre-wrap;
    line-height:1.55;font-size:.92rem;overflow-wrap:anywhere}
  .msg.user .bubble{background:var(--surface2)}
  .bubble code,.bubble pre{font-family:'JetBrains Mono','Fira Code',monospace;
    font-size:.85rem}
  .bubble img.genimg{max-width:100%;border-radius:8px;margin:.3rem 0;display:block;
    border:1px solid var(--border);cursor:zoom-in}

  /* Download / artifact affordances */
  .dl-btn{background:var(--bg);border:1px solid var(--border);color:var(--accent2);
    border-radius:6px;padding:.22rem .55rem;font-size:.73rem;font-weight:600;
    cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;
    align-items:center;gap:.25rem}
  .dl-btn:hover{border-color:var(--accent)}
  .dl-btn.ghost{color:var(--dim)}
  .img-wrap{display:inline-block}
  .img-wrap a.preview{display:block}
  .img-dl{margin-top:.35rem}
  .artifacts{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.55rem;align-items:center}
  .filecard{display:flex;align-items:center;gap:.7rem;background:var(--bg);
    border:1px solid var(--border);border-radius:8px;padding:.4rem .6rem}
  .filecard .fname{font-family:'JetBrains Mono',monospace;font-size:.79rem;color:var(--text)}

  .meta{display:flex;align-items:center;gap:.6rem;margin-top:.45rem;
    font-size:.74rem;color:var(--dim);flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:.3rem;padding:.12rem .5rem;
    border-radius:20px;font-weight:600;font-size:.72rem}
  .pill.role{color:var(--purple);background:rgba(188,140,255,.14)}
  .pill.model{color:var(--accent2);background:rgba(88,166,255,.12);
    font-family:'JetBrains Mono',monospace}
  .meta select{background:var(--bg);border:1px solid var(--border);color:var(--dim);
    border-radius:6px;font-size:.72rem;padding:.12rem .35rem;cursor:pointer}
  .meta .fixed{color:var(--green);font-weight:600}
  .meta .fixbtn{background:transparent;border:1px solid rgba(63,185,80,.35);
    color:var(--green);border-radius:6px;font-size:.72rem;padding:.12rem .4rem;
    cursor:pointer;font-family:inherit}
  .meta .fixbtn:hover{background:rgba(63,185,80,.12)}
  .meta .fixbtn:disabled{opacity:.5;cursor:wait}

  aside{width:300px;flex-shrink:0;background:var(--surface);
    border-left:1px solid var(--border);padding:1.25rem;overflow-y:auto}
  aside h3{font-size:.7rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.06em;color:var(--dim);margin-bottom:1rem}
  .insight-row{display:flex;justify-content:space-between;align-items:center;
    padding:.55rem 0;border-bottom:1px solid rgba(48,54,61,.5);font-size:.82rem}
  .insight-row:last-child{border-bottom:none}
  .insight-row .k{color:var(--dim)}
  .insight-row .v{font-weight:600;font-family:'JetBrains Mono',monospace;
    font-size:.8rem}
  .insight-empty{color:var(--dim);font-size:.82rem;line-height:1.6}

  footer{flex-shrink:0;border-top:1px solid var(--border);background:var(--surface);
    padding:.9rem 1.25rem;
    padding-bottom:calc(.9rem + env(safe-area-inset-bottom))}  /* clear the home bar */

  /* Install-to-home-screen hint (dismissible, remembered). */
  .pwa-hint{flex-shrink:0;display:flex;align-items:center;gap:.6rem;
    padding:.6rem 1rem;background:var(--surface2);border-top:1px solid var(--border);
    font-size:.85rem;color:var(--text)}
  .pwa-hint[hidden]{display:none}
  .pwa-hint .pwa-icon{font-size:1.1rem}
  .pwa-hint .pwa-text{flex:1;line-height:1.4}
  .pwa-hint .pwa-install{background:var(--accent);color:#fff;border:none;border-radius:7px;
    padding:.35rem .8rem;font-weight:600;font-size:.8rem;cursor:pointer;font-family:inherit;flex-shrink:0}
  .pwa-hint .pwa-x{background:transparent;border:none;color:var(--dim);cursor:pointer;
    font-size:.9rem;padding:.2rem .3rem;flex-shrink:0}
  .pwa-hint .pwa-x:hover{color:var(--text)}
  .composer{max-width:820px;margin:0 auto;display:flex;gap:.6rem;align-items:flex-end}
  textarea{flex:1;resize:none;background:var(--bg);border:1px solid var(--border);
    border-radius:10px;color:var(--text);padding:.7rem .9rem;font-size:.92rem;
    line-height:1.5;font-family:inherit;max-height:180px;outline:none}
  textarea:focus{border-color:var(--accent)}
  button.send{background:var(--accent);color:#fff;border:none;border-radius:10px;
    padding:.7rem 1.1rem;font-weight:700;font-size:.9rem;cursor:pointer;flex-shrink:0}
  button.send:disabled{opacity:.5;cursor:not-allowed}

  /* Absolutely centered over the TRANSCRIPT column (window minus the 300px
     Insight sidebar), not the whole window — so it sits over the chat. Sits on
     top of the header row; pointer-events pass through the empty parts to the
     logo/status underneath. */
  /* top:0 + FIXED header height — the modebar is now a body-level sibling (so it
     can go static on mobile), so it's positioned against the viewport, not the
     54px header. Pin the height explicitly or top:0/bottom:0 would span the whole
     screen and centre the buttons in the middle. */
  .modebar{position:absolute;top:0;height:54px;left:1.25rem;right:calc(300px + 1.25rem);
    display:flex;gap:.3rem;align-items:center;justify-content:center;
    flex-wrap:nowrap;overflow-x:auto;pointer-events:none}
  .modebar > *{pointer-events:auto}
  .modebar::-webkit-scrollbar{height:0}
  /* The modebar is anchored to a FIXED region and must not move when a rail
     toggles — the left rail already never touches it, and the right must match.
     (An earlier hide-right override re-anchored it on collapse, so toggling the
     Insight panel visibly shoved the modes sideways.) */
  @media(max-width:720px){ .modebar{right:1.25rem} }  /* sidebar hidden → center full width */
  /* On mobile, drop the absolute overlay and become a normal scrollable strip
     BELOW the header, so the mode buttons don't sit on top of the logo/status. */
  @media(max-width:720px){
    .modebar{position:static;height:auto;left:auto;right:auto;
      justify-content:flex-start;padding:.4rem .75rem;
      border-bottom:1px solid var(--border);background:var(--surface);pointer-events:auto}
    .modebar .lbl{display:none}
  }
  .modebar .lbl{font-size:.65rem;color:var(--dim);text-transform:uppercase;
    letter-spacing:.06em;margin-right:.1rem;flex-shrink:0}
  .mode-btn{background:var(--bg);border:1px solid var(--border);color:var(--dim);
    border-radius:16px;padding:.2rem .6rem;font-size:.74rem;font-weight:600;
    cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
  .mode-btn:hover{border-color:var(--accent)}
  .mode-btn.active{background:rgba(47,129,247,.15);border-color:var(--accent);
    color:var(--accent2)}

  .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
    background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    padding:.55rem .9rem;font-size:.82rem;color:var(--text);opacity:0;
    transition:opacity .2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .toast.ok{border-color:rgba(63,185,80,.4)}
  .toast.err{border-color:rgba(248,81,73,.4);color:var(--red)}

  .newchat{flex-shrink:0;background:var(--bg);border:1px solid var(--border);
    color:var(--dim);border-radius:16px;padding:.22rem .6rem;font-size:.74rem;
    font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
  .newchat:hover{border-color:var(--accent);color:var(--accent2)}

  /* Collapsible reasoning (<think>…</think>) — hidden by default. */
  details.reasoning{margin-top:.5rem;border:1px solid var(--border);
    border-radius:8px;background:var(--bg);overflow:hidden}
  details.reasoning summary{cursor:pointer;padding:.4rem .7rem;font-size:.74rem;
    font-weight:600;color:var(--dim);list-style:none;user-select:none}
  details.reasoning summary::-webkit-details-marker{display:none}
  details.reasoning summary:hover{color:var(--accent2)}
  details.reasoning .reasoning-body{padding:.2rem .7rem .6rem;font-size:.82rem;
    color:var(--dim);white-space:pre-wrap;line-height:1.5;border-top:1px solid var(--border)}
  @media(max-width:720px){aside{display:none}}
</style>
</head>
<body>
  <header>
    <button class="railtoggle" id="toggle-left" title="Show / hide chats">☰</button>
    <span class="logo">🍝 SpagDesk</span>
    <span class="sub">the router, visible</span>
    <span class="spacer"></span>
    <span class="dot"></span><span class="status" id="status">ready</span>
    <button class="railtoggle" id="toggle-right2" title="Show / hide router panel">◧</button>
  </header>

  <!-- Route-to modes. Absolutely overlaid on the header on desktop; its own
       scrollable strip below the header on mobile (so nothing is mushed). -->
  <div class="modebar" id="modebar"></div>

  <main>
    <nav id="sidebar">
      <div class="side-head">
        <span>Chats</span>
        <button class="side-new" id="side-new" title="Start a new chat">＋ New</button>
      </div>
      <div id="convo-list"></div>
    </nav>

    <section id="transcript">
      <div class="empty" id="empty">
        <div class="big">🍝</div>
        <div style="font-weight:700;color:var(--text);margin-bottom:.4rem">SpagDesk</div>
        <div>Ask anything. The router classifies each message and sends it to the
        right model — and shows you which one, on the right.</div>
      </div>
    </section>

    <aside>
      <div class="aside-head">
        <h3>Router Insight</h3>
        <button class="aside-collapse" id="toggle-right" title="Hide panel">›</button>
      </div>
      <div id="insight">
        <div class="insight-empty">Send a message to see how the router handled
        it — role, model, and fallback.</div>
      </div>
    </aside>
  </main>

  <div class="pwa-hint" id="pwa-hint" hidden>
    <span class="pwa-icon">🍝</span>
    <span class="pwa-text" id="pwa-text"></span>
    <button class="pwa-install" id="pwa-install" hidden>Install</button>
    <button class="pwa-x" id="pwa-dismiss" title="Dismiss">✕</button>
  </div>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Message the router…  (Auto routes per message · pick a mode to pin one · //f, //c … work inline · Enter to send)"></textarea>
      <button class="send" id="send">Send</button>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

<script>
// ── SpagDesk MVP — buildless single-page client ─────────────────────────────
// Talks to the router through Caddy: /spag/* is proxied to the router (:5000),
// which keeps it clear of Open WebUI's own /api/*.
const CHAT    = "/spag/v1/chat/completions";
const CORRECT = "/spag/api/correction";
const ROLES   = ["reasoning","code","fast","document","general","image"];
const FOOTER_RE = /\n*`?↳ LLMSpaghetti →[^\n]*`?\s*$/;  // strip the text footer; we render it natively

// ── Mode toggles ────────────────────────────────────────────────────────────
// Pin the conversation to one role (like a sticky //x), or Auto = classify each
// message. Under the hood a mode just prepends the role's slash command to the
// OUTGOING message — the router strips it. The typed text stays clean in the
// transcript and history, so multi-turn chat isn't polluted by the directive.
const MODES = [
  { id:"auto",      label:"Auto" },      { id:"reasoning", label:"Reasoning" },
  { id:"code",      label:"Code" },      { id:"general",   label:"General" },
  { id:"document",  label:"Document" },  { id:"fast",      label:"Fast" },
  { id:"image",     label:"Image" },
];
const MODE_SLASH = { reasoning:"//r", code:"//c", general:"//g",
                     document:"//d", fast:"//f", image:"//image" };
// An inline directive the user typed (short or long form) — overrides the toggle.
const SLASH_IN   = /^\s*\/{1,2}(r|c|d|f|g|reasoning|code|document|fast|general|image)\b[ \t]*/i;
const SLASH_NORM = { r:"reasoning", c:"code", d:"document", f:"fast", g:"general",
                     reasoning:"reasoning", code:"code", document:"document",
                     fast:"fast", general:"general", image:"image" };
let mode = "auto";

const messages = [];        // OpenAI-format history sent to the router
const $t = document.getElementById("transcript");
let   $empty = document.getElementById("empty");
const EMPTY_HTML  = $empty ? $empty.outerHTML : "";           // to restore on New chat
const INSIGHT_HTML = '<div class="insight-empty">Send a message to see how the ' +
  'router handled it — role, model, and fallback.</div>';
const $input = document.getElementById("input");
const $send = document.getElementById("send");
const $status = document.getElementById("status");
const $insight = document.getElementById("insight");
const $modebar = document.getElementById("modebar");

// ── Conversation persistence + left rail ────────────────────────────────────
// Conversations live in localStorage (client-side, buildless — the MVP answer to
// "backend or client store?"). A conversation is a list of TURNS: enough to redraw
// the transcript (images included) AND rebuild the API-context messages[] on load.
const STORE_KEY = "spagdesk-convos";
const $sidebar  = document.getElementById("convo-list");
let convos = loadConvos();      // [{id,title,ts,updated,turns:[{role,text,info?,image?}]}]
let convo  = null;              // the active conversation (null until the first turn)

function loadConvos(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY) || "[]"); }catch{ return []; }
}
function persistConvos(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(convos.slice(0, 100))); }catch{ /* quota */ }
}
function newConvoObj(){
  return { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
           title: "New chat", ts: Date.now(), updated: Date.now(), turns: [] };
}
function relTime(ts){
  const s = (Date.now() - ts) / 1000;
  if(s < 60)    return "just now";
  if(s < 3600)  return Math.floor(s/60) + "m ago";
  if(s < 86400) return Math.floor(s/3600) + "h ago";
  return new Date(ts).toLocaleDateString();
}

// Record a turn into the active conversation and persist. The first turn creates
// the conversation; the title comes from the first user message.
function recordTurn(turn){
  if(!convo){ convo = newConvoObj(); convos.unshift(convo); }
  convo.turns.push(turn);
  convo.updated = Date.now();
  if(convo.title === "New chat"){
    const u = convo.turns.find(t => t.role === "user");
    if(u) convo.title = u.text.slice(0, 46) + (u.text.length > 46 ? "…" : "");
  }
  persistConvos();
  renderSidebar();
}
// After an image turn completes we know the pair shouldn't feed later text context;
// flag both so a reload rebuilds messages[] the same way the live path does.
function markLastImagePair(){
  if(!convo) return;
  for(let i = convo.turns.length - 1, marked = 0; i >= 0 && marked < 2; i--){
    convo.turns[i].image = true; marked++;
  }
  persistConvos();
}

function renderSidebar(){
  $sidebar.innerHTML = "";
  if(!convos.length){
    $sidebar.innerHTML = '<div class="convo-empty">Your chats will appear here. ' +
      'They stay on this device.</div>';
    return;
  }
  for(const c of convos){
    const item = document.createElement("div");
    item.className = "convo-item" + (convo && c.id === convo.id ? " active" : "");
    item.innerHTML = `<div class="ci-body"><div class="ci-title"></div>` +
      `<div class="ci-time">${relTime(c.updated)}</div></div>` +
      `<button class="ci-del" title="Delete chat">✕</button>`;
    item.querySelector(".ci-title").textContent = c.title;   // textContent: no HTML injection
    item.querySelector(".ci-body").onclick = () => loadConvo(c.id);
    item.querySelector(".ci-del").onclick = (e) => { e.stopPropagation(); deleteConvo(c.id); };
    $sidebar.appendChild(item);
  }
}

function deleteConvo(id){
  convos = convos.filter(c => c.id !== id);
  persistConvos();
  if(convo && convo.id === id){ convo = null; newChat(); }   // deleted the open one
  else renderSidebar();
}

// Rebuild transcript + messages[] from a stored conversation.
function loadConvo(id){
  const c = convos.find(x => x.id === id);
  if(!c) return;
  convo = c;
  messages.length = 0;
  $t.innerHTML = "";
  $empty = null;
  let lastInfo = null, prevUser = "";
  for(const turn of c.turns){
    const { wrap, bubble } = addMessage(turn.role);
    renderContent(bubble, turn.text);
    if(turn.role === "user"){
      prevUser = turn.text;
      if(!turn.image) messages.push({ role: "user", content: turn.text });
    }else{
      lastInfo = turn.info || null;
      addArtifacts(wrap, turn.text, !!turn.image);
      if(!turn.image){
        messages.push({ role: "assistant", content: turn.text });
        addCorrectionRow(wrap, prevUser, turn.info);
      }
    }
  }
  renderInsight(lastInfo);
  renderSidebar();
  $t.scrollTop = $t.scrollHeight;
  $input.focus();
}

// Start a fresh chat: clear history + transcript, reset insight and mode. Fixes
// context poisoning — one bad turn no longer haunts the rest of the session. The
// previous conversation is already saved turn-by-turn, so nothing is lost.
function newChat(){
  convo = null;
  messages.length = 0;
  $t.innerHTML = EMPTY_HTML;
  $empty = document.getElementById("empty");
  $insight.innerHTML = INSIGHT_HTML;
  setMode("auto");
  $input.value = ""; autogrow(); $input.focus();
  renderSidebar();
}
document.getElementById("side-new").onclick = newChat;
renderSidebar();

// ── Collapsible rails (☰ left, ◧ right) — remembered across reloads ──────────
const RAIL_KEY = "spagdesk-rails";
const railState = (() => {
  try{ const s = JSON.parse(localStorage.getItem(RAIL_KEY)); if(s) return s; }catch{ /* fresh */ }
  const wide = window.innerWidth > 720;     // default: open on desktop, closed on phones
  return { left: wide, right: wide };
})();
function applyRails(){
  document.body.classList.toggle("hide-left",  !railState.left);
  document.body.classList.toggle("hide-right", !railState.right);
  try{ localStorage.setItem(RAIL_KEY, JSON.stringify(railState)); }catch{ /* quota */ }
}
function toggleRail(side){ railState[side] = !railState[side]; applyRails(); }
document.getElementById("toggle-left").onclick   = () => toggleRail("left");
document.getElementById("toggle-right").onclick  = () => toggleRail("right");
document.getElementById("toggle-right2").onclick = () => toggleRail("right");
applyRails();

function buildModeBar(){
  $modebar.innerHTML = '<span class="lbl">Route to</span>';
  for(const m of MODES){
    const b = document.createElement("button");
    b.className = "mode-btn" + (m.id === mode ? " active" : "");
    b.textContent = m.label; b.dataset.mode = m.id;
    b.title = m.id === "auto"
      ? "Router classifies each message and picks the model"
      : `Send every message to the ${m.label} model`;
    b.onclick = () => setMode(m.id);
    $modebar.appendChild(b);
  }
}
function setMode(id){
  mode = id;
  for(const b of $modebar.querySelectorAll(".mode-btn"))
    b.classList.toggle("active", b.dataset.mode === mode);
  $input.focus();
}
buildModeBar();

function toast(msg, kind){
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = "toast show " + (kind||"");
  setTimeout(()=>{ el.className = "toast " + (kind||""); }, 2200);
}

function renderInsight(info){
  if(!info){ return; }
  const model = info.model || "—", role = info.role || "—";
  $insight.innerHTML = `
    <div class="insight-row"><span class="k">Role</span><span class="v" style="color:var(--purple)">${role}</span></div>
    <div class="insight-row"><span class="k">Model</span><span class="v" style="color:var(--accent2)">${model}</span></div>
    <div class="insight-row"><span class="k">Fallback</span><span class="v">${info.fallback ? "yes" : "no"}</span></div>
    <div class="insight-row"><span class="k">Router</span><span class="v" style="color:var(--green)">llmspaghetti</span></div>`;
}

// Minimal inline renderer: turn ![alt](url) markdown into a real <img>, leave
// everything else as text. Not a full markdown parser — just enough for the
// image lane. Built with DOM nodes (never innerHTML) so model output can't
// inject markup, and only whitelisted image sources are turned into <img>.
const IMG_RE = /!\[[^\]]*\]\(([^)\s]+)\)/g;
// ── Download / file artifacts ───────────────────────────────────────────────
// Trigger a browser download of some text as a file (saved to the user's PC).
function downloadBlob(name, content, mime){
  const blob = new Blob([content], { type: mime || "text/plain;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
function stamp(){
  const d = new Date(), p = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
}
const MIME = { md:"text/markdown", txt:"text/plain", json:"application/json",
  csv:"text/csv", js:"text/javascript", py:"text/x-python", html:"text/html",
  yaml:"text/yaml", yml:"text/yaml", sh:"text/x-sh" };
function mimeFor(name){ return (MIME[(name.split(".").pop()||"").toLowerCase()] || "text/plain") + ";charset=utf-8"; }

// A fenced block whose info string carries a filename is a downloadable file:
// ```md sum.md   /   ```sum.md   /   ```python script.py
const FENCE_RE = /```([^\n`]*)\n([\s\S]*?)```/g;
function parseArtifacts(text){
  const out = []; let m; FENCE_RE.lastIndex = 0;
  while((m = FENCE_RE.exec(text))){
    const info = (m[1] || "").trim();
    const fn = info.split(/\s+/).find(t => /^[\w.\-\/]+\.[A-Za-z0-9]+$/.test(t));
    if(fn) out.push({ filename: fn.split("/").pop(), content: m[2].replace(/\n$/, "") });
  }
  return out;
}
// Append download affordances under a finished assistant message: a file card per
// named artifact (📄 name + Download), and — if there's no named file — a generic
// "Save reply". Image turns skip this; each image has its own Download.
function addArtifacts(wrap, text, isImage){
  if(isImage || !text.trim()) return;
  const bar = document.createElement("div"); bar.className = "artifacts";
  const files = parseArtifacts(text);
  for(const f of files){
    const card = document.createElement("div"); card.className = "filecard";
    card.innerHTML = `<span class="fname">📄 ${f.filename}</span>`;
    const btn = document.createElement("button");
    btn.className = "dl-btn"; btn.textContent = "⬇ Download";
    btn.onclick = () => downloadBlob(f.filename, f.content, mimeFor(f.filename));
    card.appendChild(btn); bar.appendChild(card);
  }
  if(!files.length){
    const btn = document.createElement("button");
    btn.className = "dl-btn ghost"; btn.textContent = "⬇ Save reply (.md)";
    btn.onclick = () => downloadBlob(`spagdesk-${stamp()}.md`, text, "text/markdown;charset=utf-8");
    bar.appendChild(btn);
  }
  wrap.appendChild(bar);
}

// ── Reasoning (<think>…</think>) ────────────────────────────────────────────
// Some models (deepseek-r1, …) emit their chain-of-thought in <think></think>.
// We hide it from the answer, from history, and from downloads, and offer it in a
// collapsible block instead — so the reply is the answer, not the monologue.
function stripThink(text){
  let t = text.replace(/<think>[\s\S]*?<\/think>/gi, "");
  const open = t.search(/<think>/i);          // an unclosed <think> is still streaming
  if(open !== -1) t = t.slice(0, open);
  return t;
}
function extractThink(text){
  return [...text.matchAll(/<think>([\s\S]*?)<\/think>/gi)]
    .map(x => x[1].trim()).filter(Boolean).join("\n\n");
}
function addReasoning(wrap, think){
  const det = document.createElement("details"); det.className = "reasoning";
  const sum = document.createElement("summary"); sum.textContent = "🧠 reasoning";
  const body = document.createElement("div"); body.className = "reasoning-body";
  body.textContent = think;
  det.appendChild(sum); det.appendChild(body); wrap.appendChild(det);
}

function renderContent(bubble, text){
  bubble.textContent = "";
  let last = 0, m, hasImg = false;
  IMG_RE.lastIndex = 0;
  while((m = IMG_RE.exec(text))){
    if(m.index > last) bubble.appendChild(document.createTextNode(text.slice(last, m.index)));
    const url = m[1];
    if(/^(\/images\/|https?:\/\/|data:image\/)/.test(url)){
      const box = document.createElement("div"); box.className = "img-wrap";
      const preview = document.createElement("a");        // click image → full size
      preview.className = "preview"; preview.href = url;
      preview.target = "_blank"; preview.rel = "noreferrer";
      const img = document.createElement("img");
      img.className = "genimg"; img.src = url; img.alt = "generated image";
      img.loading = "lazy";
      preview.appendChild(img); box.appendChild(preview);
      const name = (url.split("/").pop() || "image").split("?")[0] || "image.png";
      const dl = document.createElement("a");             // ⬇ save to PC
      dl.className = "dl-btn img-dl"; dl.href = url; dl.download = name;
      dl.textContent = "⬇ Download";
      box.appendChild(dl);
      bubble.appendChild(box);
      hasImg = true;
    }else{
      bubble.appendChild(document.createTextNode(m[0]));  // unknown source → keep literal
    }
    last = m.index + m[0].length;
  }
  if(last < text.length) bubble.appendChild(document.createTextNode(text.slice(last)));
  return hasImg;
}

// Build one assistant message element; returns handles to update it live.
function addMessage(who){
  $empty && $empty.remove();
  const wrap = document.createElement("div");
  wrap.className = "msg " + who;
  wrap.innerHTML = `<div class="who">${who==="user"?"You":"Router"}</div>
    <div class="bubble"></div>`;
  $t.appendChild(wrap);
  $t.scrollTop = $t.scrollHeight;
  return { wrap, bubble: wrap.querySelector(".bubble") };
}

// Correction controls under an assistant reply.
function addCorrectionRow(wrap, userContent, info){
  const meta = document.createElement("div");
  meta.className = "meta";
  const role = info && info.role ? info.role : "";
  const model = info && info.model ? info.model : "";
  meta.innerHTML =
    (role  ? `<span class="pill role">${role}</span>` : "") +
    (model ? `<span class="pill model">${model}</span>` : "") +
    `<span>right?</span>`;

  // ✓ confirms the role that was used. This is the half that makes the router
  // FASTER: a correct-but-expensive decision (the context model waking up to
  // classify) repeats that cost forever unless something records the win.
  // Confirming promotes it to the override tier — instant and free next time.
  // It lives here, not just in Cockpit, because this is where you actually read
  // the answer and know whether it was right.
  if(role){
    const ok = document.createElement("button");
    ok.className = "fixbtn";
    ok.textContent = "✓ right";
    ok.title = `Confirm ${role} — this message routes there instantly next time, with no model call`;
    ok.onclick = async ()=>{
      ok.disabled = true;
      try{
        const res = await fetch(CORRECT, {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ message:userContent, corrected_role:role, predicted_role:role })
        });
        if(!res.ok) throw new Error(await res.text());
        meta.innerHTML = `<span class="fixed">✓ confirmed → ${role}</span>
          <span style="color:var(--dim)">— instant next time, no model call</span>`;
        toast("Confirmed — the router learned it", "ok");
      }catch(e){ ok.disabled = false; toast("Confirm failed", "err"); }
    };
    meta.appendChild(ok);
  }

  const sel = document.createElement("select");
  sel.innerHTML = `<option value="">✎ fix…</option>` +
    ROLES.filter(r=>r!==role).map(r=>`<option value="${r}">${r}</option>`).join("");
  sel.onchange = async ()=>{
    if(!sel.value) return;
    try{
      const res = await fetch(CORRECT, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ message:userContent, corrected_role:sel.value })
      });
      if(!res.ok) throw new Error(await res.text());
      meta.innerHTML = `<span class="fixed">✓ corrected → ${sel.value}</span>
        <span style="color:var(--dim)">— similar messages route there now</span>`;
      toast("Correction saved", "ok");
    }catch(e){ toast("Correction failed", "err"); }
  };
  meta.appendChild(sel);
  wrap.appendChild(meta);
}

// Requests run CONCURRENTLY — a slow image doesn't block the chat. Fire
// "//image clown", then ask "capital of Norway" and get it from fast/general
// while the clown renders (the router is async; this just stops the UI from
// serialising). inFlight tracks how many are in the air for the status line.
let inFlight = 0;
function setStatus(){
  $status.textContent = inFlight > 1 ? `${inFlight} in flight…`
                      : inFlight === 1 ? "working…" : "ready";
}

async function send(){
  const rawText = $input.value.trim();
  if(!rawText) return;
  // Resolve the role: an inline //x the user typed wins; else the active mode
  // toggle; else Auto (let the router classify). `text` is the clean content shown
  // + stored; `wire` is what the router sees (prefixed so it routes, then strips).
  const mm   = rawText.match(SLASH_IN);
  const role = mm ? SLASH_NORM[mm[1].toLowerCase()] : (mode !== "auto" ? mode : null);
  const text = mm ? rawText.slice(mm[0].length).trim() : rawText;
  if(!text) return;                                        // a directive with no content
  const wire = role ? `${MODE_SLASH[role]} ${text}` : text;

  $input.value = ""; autogrow(); $input.focus();
  addMessage("user").bubble.textContent = text;            // clean display, no //x
  recordTurn({ role: "user", text });                       // persist (left rail)

  const { wrap, bubble } = addMessage("assistant");
  bubble.textContent = "…";
  inFlight++; setStatus();

  // Image turns only need the prompt (ComfyUI ignores history) and must NOT enter
  // the TEXT conversation — else later chat gets confused by the picture. Send them
  // standalone. Normal turns push CLEAN text to shared history and snapshot it (so a
  // concurrent send can't mutate it); only the last wire message carries the //x, so
  // history stays clean while the router still routes to the chosen role.
  const isImageCmd = role === "image";
  let userMsg = null, reqMessages;
  if(isImageCmd){
    reqMessages = [{ role:"user", content: wire }];
  }else{
    userMsg = { role:"user", content: text };
    messages.push(userMsg);
    reqMessages = messages.slice();
    if(role) reqMessages[reqMessages.length - 1] = { role:"user", content: wire };
  }

  let full = "", info = null, raw = "", errMsg = null;
  try{
    const res = await fetch(CHAT, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer sk-llmspaghetti" },
      body: JSON.stringify({ model:"auto", stream:true, messages: reqMessages })
    });
    if(!res.body) throw new Error("no response body from router");
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    for(;;){
      const { done, value } = await reader.read();
      if(done) break;
      const txt = dec.decode(value, { stream:true });
      raw += txt; buf += txt;
      const lines = buf.split("\n");
      buf = lines.pop();                       // keep partial line
      for(const line of lines){
        const s = line.trim();
        if(!s.startsWith("data:")) continue;
        const data = s.slice(5).trim();
        if(data === "[DONE]") continue;
        let chunk; try{ chunk = JSON.parse(data); }catch{ continue; }
        if(chunk.error) errMsg = chunk.error.message || chunk.error;
        if(chunk.x_llmspaghetti) info = chunk.x_llmspaghetti;
        const delta = chunk.choices && chunk.choices[0] && chunk.choices[0].delta;
        if(delta && delta.content){
          full += delta.content;
          const shown = stripThink(full).replace(FOOTER_RE, "").trim();  // hide footer + reasoning
          bubble.textContent = shown || (/<think>/i.test(full) ? "🧠 thinking…" : "…");
          $t.scrollTop = $t.scrollHeight;
        }
      }
    }
    const noFooter = full.replace(FOOTER_RE, "");
    const think = extractThink(noFooter);
    let clean = stripThink(noFooter).trim();
    if(!clean) clean = think || noFooter.trim();   // only-thinking / unclosed → show what we have
    if(clean){
      renderContent(bubble, clean);          // render inline images; text stays text
      if(think && think !== clean) addReasoning(wrap, think);   // foldable 🧠 reasoning
      // Image turns (explicit //image, or the router classified it as image) stay
      // OUT of the text history so later chat isn't confused by the picture/prompt.
      const isImage = isImageCmd || (info && info.role === "image");
      if(isImage){
        if(userMsg){ const i = messages.indexOf(userMsg); if(i >= 0) messages.splice(i, 1); }
      }else{
        messages.push({ role:"assistant", content: clean });
      }
      renderInsight(info);
      addArtifacts(wrap, clean, isImage);    // ⬇ save reply / named file cards
      addCorrectionRow(wrap, text, info);
      recordTurn({ role: "assistant", text: clean, info, image: isImage });
      if(isImage) markLastImagePair();       // keep the image pair out of reloaded context
    }else{
      // No chat content — surface whatever came back (usually a router/LiteLLM error).
      if(!errMsg){
        try{ const j = JSON.parse(raw); errMsg = (j.error && (j.error.message||j.error)) || j.detail || raw; }
        catch{ errMsg = raw.trim() || "empty response from router"; }
      }
      bubble.textContent = "⚠ " + String(errMsg).slice(0, 400);
    }
  }catch(e){
    bubble.textContent = "⚠ " + (e.message || "request failed");
  }finally{
    inFlight--; setStatus();
  }
}

function autogrow(){
  $input.style.height = "auto";
  $input.style.height = Math.min($input.scrollHeight, 180) + "px";
}
$input.addEventListener("input", autogrow);
$input.addEventListener("keydown", e=>{
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); send(); }
});
$send.addEventListener("click", send);
$input.focus();

// ── Add-to-home-screen (PWA) ────────────────────────────────────────────────
// Progressive: if the browser offers a real install prompt (Chrome/Android in a
// SECURE context — HTTPS or localhost) we show an Install button. On a plain-HTTP
// LAN box that prompt never fires, so we fall back to per-platform manual steps.
// Either way: dismissible, remembered, and never shown once installed.
(function(){
  const PWA_KEY = "spagdesk-pwa-dismissed";
  const $hint = document.getElementById("pwa-hint");
  const $text = document.getElementById("pwa-text");
  const $install = document.getElementById("pwa-install");
  let deferred = null;

  const installed = () =>
    window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  const dismissed = () => { try{ return localStorage.getItem(PWA_KEY) === "1"; }catch{ return false; } };
  const hide = () => { $hint.hidden = true; };
  function show(text, withButton){
    if(dismissed() || installed()) return;
    $text.textContent = text;
    $install.hidden = !withButton;
    $hint.hidden = false;
  }

  // Secure context → a real install prompt is available.
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault(); deferred = e;
    show("Add SpagDesk to your home screen for one-tap access.", true);
  });
  $install.onclick = async () => {
    if(!deferred) return;
    deferred.prompt();
    try{ await deferred.userChoice; }catch{ /* dismissed */ }
    deferred = null; hide();
  };
  document.getElementById("pwa-dismiss").onclick = () => {
    try{ localStorage.setItem(PWA_KEY, "1"); }catch{ /* quota */ }
    hide();
  };
  window.addEventListener("appinstalled", () => { try{ localStorage.setItem(PWA_KEY, "1"); }catch{} hide(); });

  // No install prompt (the plain-HTTP LAN case): guide the manual add on mobile,
  // once, after a short delay so it doesn't interrupt the first glance.
  window.addEventListener("load", () => {
    if(dismissed() || installed()) return;
    setTimeout(() => {
      if(deferred || !$hint.hidden) return;                 // prompt path already handled it
      const ua = navigator.userAgent;
      if(/iphone|ipad|ipod/i.test(ua))
        show("Install: tap Share ⬆, then “Add to Home Screen”.", false);
      else if(/android/i.test(ua))
        show("Install: tap ⋮ (menu), then “Add to Home screen”.", false);
      // desktop: no nag
    }, 2500);
  });
})();
</script>
