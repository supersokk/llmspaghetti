<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SpagDesk</title>
<style>
  :root{
    --bg:#0d1117; --surface:#161b22; --surface2:#1c2230; --border:#30363d;
    --accent:#2f81f7; --accent2:#58a6ff; --green:#3fb950; --yellow:#d29922;
    --red:#f85149; --purple:#bc8cff; --text:#e6edf3; --dim:#8b949e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    display:flex;flex-direction:column;height:100vh;overflow:hidden}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  header{display:flex;align-items:center;gap:.7rem;padding:0 1.25rem;height:54px;
    background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
    position:relative}
  header .spacer{flex:1}
  header .logo{font-size:1.15rem;font-weight:800;letter-spacing:.02em;flex-shrink:0}
  header .sub{font-size:.78rem;color:var(--dim);flex-shrink:0}
  header .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
  header .status{font-size:.75rem;color:var(--dim);flex-shrink:0;white-space:nowrap}
  /* On narrower screens, drop the subtitle so the mode bar keeps room to breathe. */
  @media(max-width:900px){ header .sub{display:none} }

  main{flex:1;display:flex;min-height:0}
  #transcript{flex:1;overflow-y:auto;padding:1.5rem;display:flex;
    flex-direction:column;gap:1.1rem}
  #transcript .empty{margin:auto;text-align:center;color:var(--dim);max-width:420px}
  #transcript .empty .big{font-size:2.4rem;margin-bottom:.5rem}

  .msg{max-width:820px;width:100%;margin:0 auto}
  .msg .who{font-size:.7rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.06em;color:var(--dim);margin-bottom:.35rem}
  .msg.user .who{color:var(--accent2)}
  .bubble{background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:.85rem 1.1rem;white-space:pre-wrap;
    line-height:1.55;font-size:.92rem;overflow-wrap:anywhere}
  .msg.user .bubble{background:var(--surface2)}
  .bubble code,.bubble pre{font-family:'JetBrains Mono','Fira Code',monospace;
    font-size:.85rem}
  .bubble img.genimg{max-width:100%;border-radius:8px;margin:.3rem 0;display:block;
    border:1px solid var(--border);cursor:zoom-in}

  /* Download / artifact affordances */
  .dl-btn{background:var(--bg);border:1px solid var(--border);color:var(--accent2);
    border-radius:6px;padding:.22rem .55rem;font-size:.73rem;font-weight:600;
    cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;
    align-items:center;gap:.25rem}
  .dl-btn:hover{border-color:var(--accent)}
  .dl-btn.ghost{color:var(--dim)}
  .img-wrap{display:inline-block}
  .img-wrap a.preview{display:block}
  .img-dl{margin-top:.35rem}
  .artifacts{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.55rem;align-items:center}
  .filecard{display:flex;align-items:center;gap:.7rem;background:var(--bg);
    border:1px solid var(--border);border-radius:8px;padding:.4rem .6rem}
  .filecard .fname{font-family:'JetBrains Mono',monospace;font-size:.79rem;color:var(--text)}

  .meta{display:flex;align-items:center;gap:.6rem;margin-top:.45rem;
    font-size:.74rem;color:var(--dim);flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:.3rem;padding:.12rem .5rem;
    border-radius:20px;font-weight:600;font-size:.72rem}
  .pill.role{color:var(--purple);background:rgba(188,140,255,.14)}
  .pill.model{color:var(--accent2);background:rgba(88,166,255,.12);
    font-family:'JetBrains Mono',monospace}
  .meta select{background:var(--bg);border:1px solid var(--border);color:var(--dim);
    border-radius:6px;font-size:.72rem;padding:.12rem .35rem;cursor:pointer}
  .meta .fixed{color:var(--green);font-weight:600}

  aside{width:300px;flex-shrink:0;background:var(--surface);
    border-left:1px solid var(--border);padding:1.25rem;overflow-y:auto}
  aside h3{font-size:.7rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.06em;color:var(--dim);margin-bottom:1rem}
  .insight-row{display:flex;justify-content:space-between;align-items:center;
    padding:.55rem 0;border-bottom:1px solid rgba(48,54,61,.5);font-size:.82rem}
  .insight-row:last-child{border-bottom:none}
  .insight-row .k{color:var(--dim)}
  .insight-row .v{font-weight:600;font-family:'JetBrains Mono',monospace;
    font-size:.8rem}
  .insight-empty{color:var(--dim);font-size:.82rem;line-height:1.6}

  footer{flex-shrink:0;border-top:1px solid var(--border);background:var(--surface);
    padding:.9rem 1.25rem}
  .composer{max-width:820px;margin:0 auto;display:flex;gap:.6rem;align-items:flex-end}
  textarea{flex:1;resize:none;background:var(--bg);border:1px solid var(--border);
    border-radius:10px;color:var(--text);padding:.7rem .9rem;font-size:.92rem;
    line-height:1.5;font-family:inherit;max-height:180px;outline:none}
  textarea:focus{border-color:var(--accent)}
  button.send{background:var(--accent);color:#fff;border:none;border-radius:10px;
    padding:.7rem 1.1rem;font-weight:700;font-size:.9rem;cursor:pointer;flex-shrink:0}
  button.send:disabled{opacity:.5;cursor:not-allowed}

  /* Absolutely centered over the TRANSCRIPT column (window minus the 300px
     Insight sidebar), not the whole window — so it sits over the chat. Sits on
     top of the header row; pointer-events pass through the empty parts to the
     logo/status underneath. */
  .modebar{position:absolute;top:0;bottom:0;left:1.25rem;right:calc(300px + 1.25rem);
    display:flex;gap:.3rem;align-items:center;justify-content:center;
    flex-wrap:nowrap;overflow-x:auto;pointer-events:none}
  .modebar > *{pointer-events:auto}
  .modebar::-webkit-scrollbar{height:0}
  @media(max-width:720px){ .modebar{right:1.25rem} }  /* sidebar hidden → center full width */
  .modebar .lbl{font-size:.65rem;color:var(--dim);text-transform:uppercase;
    letter-spacing:.06em;margin-right:.1rem;flex-shrink:0}
  .mode-btn{background:var(--bg);border:1px solid var(--border);color:var(--dim);
    border-radius:16px;padding:.2rem .6rem;font-size:.74rem;font-weight:600;
    cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
  .mode-btn:hover{border-color:var(--accent)}
  .mode-btn.active{background:rgba(47,129,247,.15);border-color:var(--accent);
    color:var(--accent2)}

  .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
    background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    padding:.55rem .9rem;font-size:.82rem;color:var(--text);opacity:0;
    transition:opacity .2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .toast.ok{border-color:rgba(63,185,80,.4)}
  .toast.err{border-color:rgba(248,81,73,.4);color:var(--red)}
  @media(max-width:720px){aside{display:none}}
</style>
</head>
<body>
  <header>
    <span class="logo">🍝 SpagDesk</span>
    <span class="sub">the router, visible</span>
    <span class="spacer"></span>
    <span class="dot"></span><span class="status" id="status">ready</span>
    <div class="modebar" id="modebar"></div>
  </header>

  <main>
    <section id="transcript">
      <div class="empty" id="empty">
        <div class="big">🍝</div>
        <div style="font-weight:700;color:var(--text);margin-bottom:.4rem">SpagDesk</div>
        <div>Ask anything. The router classifies each message and sends it to the
        right model — and shows you which one, on the right.</div>
      </div>
    </section>

    <aside>
      <h3>Router Insight</h3>
      <div id="insight">
        <div class="insight-empty">Send a message to see how the router handled
        it — role, model, and fallback.</div>
      </div>
    </aside>
  </main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Message the router…  (Auto routes per message · pick a mode to pin one · //f, //c … work inline · Enter to send)"></textarea>
      <button class="send" id="send">Send</button>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

<script>
// ── SpagDesk MVP — buildless single-page client ─────────────────────────────
// Talks to the router through Caddy: /spag/* is proxied to the router (:5000),
// which keeps it clear of Open WebUI's own /api/*.
const CHAT    = "/spag/v1/chat/completions";
const CORRECT = "/spag/api/correction";
const ROLES   = ["reasoning","code","fast","document","general","image"];
const FOOTER_RE = /\n*`?↳ LLMSpaghetti →[^\n]*`?\s*$/;  // strip the text footer; we render it natively

// ── Mode toggles ────────────────────────────────────────────────────────────
// Pin the conversation to one role (like a sticky //x), or Auto = classify each
// message. Under the hood a mode just prepends the role's slash command to the
// OUTGOING message — the router strips it. The typed text stays clean in the
// transcript and history, so multi-turn chat isn't polluted by the directive.
const MODES = [
  { id:"auto",      label:"Auto" },      { id:"reasoning", label:"Reasoning" },
  { id:"code",      label:"Code" },      { id:"general",   label:"General" },
  { id:"document",  label:"Document" },  { id:"fast",      label:"Fast" },
  { id:"image",     label:"Image" },
];
const MODE_SLASH = { reasoning:"//r", code:"//c", general:"//g",
                     document:"//d", fast:"//f", image:"//image" };
// An inline directive the user typed (short or long form) — overrides the toggle.
const SLASH_IN   = /^\s*\/{1,2}(r|c|d|f|g|reasoning|code|document|fast|general|image)\b[ \t]*/i;
const SLASH_NORM = { r:"reasoning", c:"code", d:"document", f:"fast", g:"general",
                     reasoning:"reasoning", code:"code", document:"document",
                     fast:"fast", general:"general", image:"image" };
let mode = "auto";

const messages = [];        // OpenAI-format history sent to the router
const $t = document.getElementById("transcript");
const $empty = document.getElementById("empty");
const $input = document.getElementById("input");
const $send = document.getElementById("send");
const $status = document.getElementById("status");
const $insight = document.getElementById("insight");
const $modebar = document.getElementById("modebar");

function buildModeBar(){
  $modebar.innerHTML = '<span class="lbl">Route to</span>';
  for(const m of MODES){
    const b = document.createElement("button");
    b.className = "mode-btn" + (m.id === mode ? " active" : "");
    b.textContent = m.label; b.dataset.mode = m.id;
    b.title = m.id === "auto"
      ? "Router classifies each message and picks the model"
      : `Send every message to the ${m.label} model`;
    b.onclick = () => setMode(m.id);
    $modebar.appendChild(b);
  }
}
function setMode(id){
  mode = id;
  for(const b of $modebar.querySelectorAll(".mode-btn"))
    b.classList.toggle("active", b.dataset.mode === mode);
  $input.focus();
}
buildModeBar();

function toast(msg, kind){
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = "toast show " + (kind||"");
  setTimeout(()=>{ el.className = "toast " + (kind||""); }, 2200);
}

function renderInsight(info){
  if(!info){ return; }
  const model = info.model || "—", role = info.role || "—";
  $insight.innerHTML = `
    <div class="insight-row"><span class="k">Role</span><span class="v" style="color:var(--purple)">${role}</span></div>
    <div class="insight-row"><span class="k">Model</span><span class="v" style="color:var(--accent2)">${model}</span></div>
    <div class="insight-row"><span class="k">Fallback</span><span class="v">${info.fallback ? "yes" : "no"}</span></div>
    <div class="insight-row"><span class="k">Router</span><span class="v" style="color:var(--green)">llmspaghetti</span></div>`;
}

// Minimal inline renderer: turn ![alt](url) markdown into a real <img>, leave
// everything else as text. Not a full markdown parser — just enough for the
// image lane. Built with DOM nodes (never innerHTML) so model output can't
// inject markup, and only whitelisted image sources are turned into <img>.
const IMG_RE = /!\[[^\]]*\]\(([^)\s]+)\)/g;
// ── Download / file artifacts ───────────────────────────────────────────────
// Trigger a browser download of some text as a file (saved to the user's PC).
function downloadBlob(name, content, mime){
  const blob = new Blob([content], { type: mime || "text/plain;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
function stamp(){
  const d = new Date(), p = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
}
const MIME = { md:"text/markdown", txt:"text/plain", json:"application/json",
  csv:"text/csv", js:"text/javascript", py:"text/x-python", html:"text/html",
  yaml:"text/yaml", yml:"text/yaml", sh:"text/x-sh" };
function mimeFor(name){ return (MIME[(name.split(".").pop()||"").toLowerCase()] || "text/plain") + ";charset=utf-8"; }

// A fenced block whose info string carries a filename is a downloadable file:
// ```md sum.md   /   ```sum.md   /   ```python script.py
const FENCE_RE = /```([^\n`]*)\n([\s\S]*?)```/g;
function parseArtifacts(text){
  const out = []; let m; FENCE_RE.lastIndex = 0;
  while((m = FENCE_RE.exec(text))){
    const info = (m[1] || "").trim();
    const fn = info.split(/\s+/).find(t => /^[\w.\-\/]+\.[A-Za-z0-9]+$/.test(t));
    if(fn) out.push({ filename: fn.split("/").pop(), content: m[2].replace(/\n$/, "") });
  }
  return out;
}
// Append download affordances under a finished assistant message: a file card per
// named artifact (📄 name + Download), and — if there's no named file — a generic
// "Save reply". Image turns skip this; each image has its own Download.
function addArtifacts(wrap, text, isImage){
  if(isImage || !text.trim()) return;
  const bar = document.createElement("div"); bar.className = "artifacts";
  const files = parseArtifacts(text);
  for(const f of files){
    const card = document.createElement("div"); card.className = "filecard";
    card.innerHTML = `<span class="fname">📄 ${f.filename}</span>`;
    const btn = document.createElement("button");
    btn.className = "dl-btn"; btn.textContent = "⬇ Download";
    btn.onclick = () => downloadBlob(f.filename, f.content, mimeFor(f.filename));
    card.appendChild(btn); bar.appendChild(card);
  }
  if(!files.length){
    const btn = document.createElement("button");
    btn.className = "dl-btn ghost"; btn.textContent = "⬇ Save reply (.md)";
    btn.onclick = () => downloadBlob(`spagdesk-${stamp()}.md`, text, "text/markdown;charset=utf-8");
    bar.appendChild(btn);
  }
  wrap.appendChild(bar);
}

function renderContent(bubble, text){
  bubble.textContent = "";
  let last = 0, m, hasImg = false;
  IMG_RE.lastIndex = 0;
  while((m = IMG_RE.exec(text))){
    if(m.index > last) bubble.appendChild(document.createTextNode(text.slice(last, m.index)));
    const url = m[1];
    if(/^(\/images\/|https?:\/\/|data:image\/)/.test(url)){
      const box = document.createElement("div"); box.className = "img-wrap";
      const preview = document.createElement("a");        // click image → full size
      preview.className = "preview"; preview.href = url;
      preview.target = "_blank"; preview.rel = "noreferrer";
      const img = document.createElement("img");
      img.className = "genimg"; img.src = url; img.alt = "generated image";
      img.loading = "lazy";
      preview.appendChild(img); box.appendChild(preview);
      const name = (url.split("/").pop() || "image").split("?")[0] || "image.png";
      const dl = document.createElement("a");             // ⬇ save to PC
      dl.className = "dl-btn img-dl"; dl.href = url; dl.download = name;
      dl.textContent = "⬇ Download";
      box.appendChild(dl);
      bubble.appendChild(box);
      hasImg = true;
    }else{
      bubble.appendChild(document.createTextNode(m[0]));  // unknown source → keep literal
    }
    last = m.index + m[0].length;
  }
  if(last < text.length) bubble.appendChild(document.createTextNode(text.slice(last)));
  return hasImg;
}

// Build one assistant message element; returns handles to update it live.
function addMessage(who){
  $empty && $empty.remove();
  const wrap = document.createElement("div");
  wrap.className = "msg " + who;
  wrap.innerHTML = `<div class="who">${who==="user"?"You":"Router"}</div>
    <div class="bubble"></div>`;
  $t.appendChild(wrap);
  $t.scrollTop = $t.scrollHeight;
  return { wrap, bubble: wrap.querySelector(".bubble") };
}

// Correction controls under an assistant reply.
function addCorrectionRow(wrap, userContent, info){
  const meta = document.createElement("div");
  meta.className = "meta";
  const role = info && info.role ? info.role : "";
  const model = info && info.model ? info.model : "";
  meta.innerHTML =
    (role  ? `<span class="pill role">${role}</span>` : "") +
    (model ? `<span class="pill model">${model}</span>` : "") +
    `<span>wrong?</span>`;
  const sel = document.createElement("select");
  sel.innerHTML = `<option value="">✎ fix…</option>` +
    ROLES.filter(r=>r!==role).map(r=>`<option value="${r}">${r}</option>`).join("");
  sel.onchange = async ()=>{
    if(!sel.value) return;
    try{
      const res = await fetch(CORRECT, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ message:userContent, corrected_role:sel.value })
      });
      if(!res.ok) throw new Error(await res.text());
      meta.innerHTML = `<span class="fixed">✓ corrected → ${sel.value}</span>
        <span style="color:var(--dim)">— similar messages route there now</span>`;
      toast("Correction saved", "ok");
    }catch(e){ toast("Correction failed", "err"); }
  };
  meta.appendChild(sel);
  wrap.appendChild(meta);
}

// Requests run CONCURRENTLY — a slow image doesn't block the chat. Fire
// "//image clown", then ask "capital of Norway" and get it from fast/general
// while the clown renders (the router is async; this just stops the UI from
// serialising). inFlight tracks how many are in the air for the status line.
let inFlight = 0;
function setStatus(){
  $status.textContent = inFlight > 1 ? `${inFlight} in flight…`
                      : inFlight === 1 ? "working…" : "ready";
}

async function send(){
  const rawText = $input.value.trim();
  if(!rawText) return;
  // Resolve the role: an inline //x the user typed wins; else the active mode
  // toggle; else Auto (let the router classify). `text` is the clean content shown
  // + stored; `wire` is what the router sees (prefixed so it routes, then strips).
  const mm   = rawText.match(SLASH_IN);
  const role = mm ? SLASH_NORM[mm[1].toLowerCase()] : (mode !== "auto" ? mode : null);
  const text = mm ? rawText.slice(mm[0].length).trim() : rawText;
  if(!text) return;                                        // a directive with no content
  const wire = role ? `${MODE_SLASH[role]} ${text}` : text;

  $input.value = ""; autogrow(); $input.focus();
  addMessage("user").bubble.textContent = text;            // clean display, no //x

  const { wrap, bubble } = addMessage("assistant");
  bubble.textContent = "…";
  inFlight++; setStatus();

  // Image turns only need the prompt (ComfyUI ignores history) and must NOT enter
  // the TEXT conversation — else later chat gets confused by the picture. Send them
  // standalone. Normal turns push CLEAN text to shared history and snapshot it (so a
  // concurrent send can't mutate it); only the last wire message carries the //x, so
  // history stays clean while the router still routes to the chosen role.
  const isImageCmd = role === "image";
  let userMsg = null, reqMessages;
  if(isImageCmd){
    reqMessages = [{ role:"user", content: wire }];
  }else{
    userMsg = { role:"user", content: text };
    messages.push(userMsg);
    reqMessages = messages.slice();
    if(role) reqMessages[reqMessages.length - 1] = { role:"user", content: wire };
  }

  let full = "", info = null, raw = "", errMsg = null;
  try{
    const res = await fetch(CHAT, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer sk-llmspaghetti" },
      body: JSON.stringify({ model:"auto", stream:true, messages: reqMessages })
    });
    if(!res.body) throw new Error("no response body from router");
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    for(;;){
      const { done, value } = await reader.read();
      if(done) break;
      const txt = dec.decode(value, { stream:true });
      raw += txt; buf += txt;
      const lines = buf.split("\n");
      buf = lines.pop();                       // keep partial line
      for(const line of lines){
        const s = line.trim();
        if(!s.startsWith("data:")) continue;
        const data = s.slice(5).trim();
        if(data === "[DONE]") continue;
        let chunk; try{ chunk = JSON.parse(data); }catch{ continue; }
        if(chunk.error) errMsg = chunk.error.message || chunk.error;
        if(chunk.x_llmspaghetti) info = chunk.x_llmspaghetti;
        const delta = chunk.choices && chunk.choices[0] && chunk.choices[0].delta;
        if(delta && delta.content){
          full += delta.content;
          bubble.textContent = full.replace(FOOTER_RE, "");   // hide text footer; shown natively
          $t.scrollTop = $t.scrollHeight;
        }
      }
    }
    const clean = full.replace(FOOTER_RE, "").trim();
    if(clean){
      renderContent(bubble, clean);          // render inline images; text stays text
      // Image turns (explicit //image, or the router classified it as image) stay
      // OUT of the text history so later chat isn't confused by the picture/prompt.
      const isImage = isImageCmd || (info && info.role === "image");
      if(isImage){
        if(userMsg){ const i = messages.indexOf(userMsg); if(i >= 0) messages.splice(i, 1); }
      }else{
        messages.push({ role:"assistant", content: clean });
      }
      renderInsight(info);
      addArtifacts(wrap, clean, isImage);    // ⬇ save reply / named file cards
      addCorrectionRow(wrap, text, info);
    }else{
      // No chat content — surface whatever came back (usually a router/LiteLLM error).
      if(!errMsg){
        try{ const j = JSON.parse(raw); errMsg = (j.error && (j.error.message||j.error)) || j.detail || raw; }
        catch{ errMsg = raw.trim() || "empty response from router"; }
      }
      bubble.textContent = "⚠ " + String(errMsg).slice(0, 400);
    }
  }catch(e){
    bubble.textContent = "⚠ " + (e.message || "request failed");
  }finally{
    inFlight--; setStatus();
  }
}

function autogrow(){
  $input.style.height = "auto";
  $input.style.height = Math.min($input.scrollHeight, 180) + "px";
}
