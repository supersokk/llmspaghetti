# LLMSpaghetti Docker Compose Stack
# Generated by llmspaghetti-bootstrap.sh — edit with: spag config
#
# Services:
#   litellm      OpenAI-compatible proxy  → port 4000
#   router       classifies + forwards    → port 5000
# (Open WebUI is optional now — install it from the Cockpit Services tab.)

networks:
  llmspaghetti:
    driver: bridge

volumes:
  litellm_data:
    driver: local

x-gpu-nvidia: &gpu-nvidia
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:

  # ── Router ─────────────────────────────────────────────────────────────────
  # Sits between Open WebUI and LiteLLM.
  # Classifies each message and silently rewrites the model field.
  router:
    build:
      context: ${INSTALL_DIR:-/opt/llmspaghetti}
      dockerfile: router/Dockerfile
    container_name: llmspaghetti-router
    restart: unless-stopped
    networks: [llmspaghetti]
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ${INSTALL_DIR:-/opt/llmspaghetti}/router:/opt/llmspaghetti/router:ro
      - ${INSTALL_DIR:-/opt/llmspaghetti}/eval:/opt/llmspaghetti/eval:ro
      - ${INSTALL_DIR:-/opt/llmspaghetti}/config:/opt/llmspaghetti/config:ro
      - ${INSTALL_DIR:-/opt/llmspaghetti}/data:/opt/llmspaghetti/data
      - ${INSTALL_DIR:-/opt/llmspaghetti}/images:/opt/llmspaghetti/images
    env_file:
      # Generated at install time — mark optional so `docker compose config` (CI's
      # pre-build validation) doesn't fail when the file isn't present yet.
      - path: ${INSTALL_DIR:-/opt/llmspaghetti}/config/api_keys.env
        required: false
    environment:
      - LITELLM_URL=http://litellm:4000
      - OLLAMA_URL=http://host.docker.internal:11434
      - COMFYUI_URL=http://host.docker.internal:8188
      - INSTALL_DIR=/opt/llmspaghetti
    depends_on:
      - litellm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ── Open WebUI ─────────────────────────────────────────────────────────────
  # Open WebUI is NO LONGER part of the default stack — SpagDesk (served by Caddy
  # at /) is the primary client, so OWUI doesn't sit in RAM by default. Install it
  # on demand from the Cockpit Services tab (it runs on :3000, reaching the router
  # via host.docker.internal:5000). "WebUI's work is done" — it was the bootstrap
  # client; SpagDesk replaced it.

  # ── LiteLLM Proxy ──────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: llmspaghetti-litellm
    restart: unless-stopped
    networks: [llmspaghetti]
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - /opt/llmspaghetti/config/litellm_config.yaml:/app/config.yaml:ro
      - litellm_data:/app/data
    command: >
      --config /app/config.yaml
      --port 4000
      --num_workers 1
    env_file:
      - /opt/llmspaghetti/config/api_keys.env
    environment:
      - LITELLM_LOG=ERROR
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
