# LLMSpaghetti Docker Compose Stack
# Generated by llmspaghetti-bootstrap.sh — edit with: spag config
#
# Services:
#   open-webui   Chat UI + model manager  → port 3000
#   litellm      OpenAI-compatible proxy  → port 4000

networks:
  llmspaghetti:
    driver: bridge

volumes:
  openwebui_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/llmspaghetti/data/webui
  litellm_data:
    driver: local

x-gpu-nvidia: &gpu-nvidia
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:

  # ── Router ─────────────────────────────────────────────────────────────────
  # Sits between Open WebUI and LiteLLM.
  # Classifies each message and silently rewrites the model field.
  router:
    build:
      context: ${INSTALL_DIR:-/opt/llmspaghetti}
      dockerfile: router/Dockerfile
    container_name: llmspaghetti-router
    restart: unless-stopped
    networks: [llmspaghetti]
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ${INSTALL_DIR:-/opt/llmspaghetti}/router:/opt/llmspaghetti/router:ro
      - ${INSTALL_DIR:-/opt/llmspaghetti}/eval:/opt/llmspaghetti/eval:ro
      - ${INSTALL_DIR:-/opt/llmspaghetti}/config:/opt/llmspaghetti/config:ro
      - ${INSTALL_DIR:-/opt/llmspaghetti}/data:/opt/llmspaghetti/data
      - ${INSTALL_DIR:-/opt/llmspaghetti}/images:/opt/llmspaghetti/images
    env_file:
      - ${INSTALL_DIR:-/opt/llmspaghetti}/config/api_keys.env
    environment:
      - LITELLM_URL=http://litellm:4000
      - OLLAMA_URL=http://host.docker.internal:11434
      - COMFYUI_URL=http://host.docker.internal:8188
      - INSTALL_DIR=/opt/llmspaghetti
    depends_on:
      - litellm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ── Open WebUI ─────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: llmspaghetti-webui
    restart: unless-stopped
    networks: [llmspaghetti]
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      # CRITICAL: Ollama's native API is disabled so EVERY message goes
      # through the router. If Open WebUI talked to Ollama directly, routing
      # would be bypassed entirely — that breaks the whole product.
      # Model management lives in Cockpit (Models tab) and the `spag` CLI.
      - ENABLE_OLLAMA_API=false
      # The only model source: the router, which classifies and forwards.
      - OPENAI_API_BASE_URL=http://router:5000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-llmspaghetti}
      # Branding
      - WEBUI_NAME=LLMSpaghetti
      - WEBUI_URL=http://localhost:3000
      # Auth (change to 'false' to require login)
      - ENABLE_SIGNUP=true
      - DEFAULT_USER_ROLE=admin
    depends_on:
      - router
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ── LiteLLM Proxy ──────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: llmspaghetti-litellm
    restart: unless-stopped
    networks: [llmspaghetti]
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - /opt/llmspaghetti/config/litellm_config.yaml:/app/config.yaml:ro
      - litellm_data:/app/data
    command: >
      --config /app/config.yaml
      --port 4000
      --num_workers 1
    env_file:
      - /opt/llmspaghetti/config/api_keys.env
    environment:
      - LITELLM_LOG=ERROR
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
