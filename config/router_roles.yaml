# LLMSpaghetti Router — Role → Model mapping
# Managed by the Routing panel. Edit with: spag config
#
# Local roles use the RAW Ollama model name (e.g. "qwen2.5:3b") — the router
# forwards bare names straight to Ollama, no alias needed. Cloud roles use a
# model_name from litellm_config.yaml (e.g. "claude-sonnet").
# Set a role to null to exclude it from auto-routing (direct calls only).
#
# Routing modes:
#   auto   — classify each message and pick the right model automatically
#   single — bypass classification, send every message to single_model

mode: "auto"
single_model: null

# Fallback model when a role is unset — a real model name (raw Ollama name or a
# cloud model_name), never an alias. First-boot sets this to your picked model.
default_model: null

# Append "↳ LLMSpaghetti → <model> · <role>" to every reply (visible footer + a
# machine-readable x_llmspaghetti field). Core "show your work" principle —
# leave it on unless you have a reason not to. Set false to hide the tag.
show_provenance: true

# Fuzzy-correction match threshold (cosine similarity, 0–1). When a message
# isn't classified by signal/keyword, the router embeds it and checks learned
# corrections; a neighbour at or above this similarity wins. Higher = stricter
# (near-exact only); lower = looser (risks bleeding one correction into
# unrelated messages). Needs the nomic-embed-text model pulled.
#
# Calibrated on nomic-embed-text: real paraphrases of a stored correction score
# ~0.66–0.77, clearly unrelated messages ~0.38–0.42. 0.6 sits in that gap —
# catches rewordings, rejects unrelated. Tune per your data; watch the router
# log for "fuzzy override best sim=..." near-misses.
knn_threshold: 0.6

# ── Smart routing — context model (OPT-IN) ───────────────────────────────────
# A small local model that classifies the messages keyword + learned corrections
# both miss. It is the LAST voice before the general floor: it never overrides a
# confident classification, and if it's absent, paused or fails, routing falls
# back to keyword+kNN exactly as before — it can't break routing.
#
# The install IS the opt-in: set a model here (and pull it) and the tier exists.
#   spag pull qwen3:0.6b     →  context_model: "qwen3:0.6b"
# Swappable — qwen3:0.6b, qwen3:1.7b, gemma3:1b, llama3.2:1b, or a future
# purpose-built router model. Empty/null = off (no RAM cost, no tier).
context_model: null

# Where it runs. Default cpu keeps it OUT of VRAM so it never competes with your
# chat/image models — it only fires on uncertain messages, so it doesn't miss the
# GPU speed. Set gpu if you have VRAM headroom and want the lower latency.
#   cpu (default) | gpu | auto (let Ollama decide)
context_model_device: cpu

# Pause without uninstalling — the A/B switch for "is this actually helping?".
# Model stays on disk and resumes instantly.
context_model_paused: false

# First-boot fills these with your picked model (raw Ollama name) or a cloud
# model_name. Assign them in the Routing panel — pick from your installed models.
roles:
  image:     null
  code:      null
  reasoning: null
  fast:      null
  document:  null
  general:   null
  # Housekeeping (chat titles, tags, follow-up suggestions, autocomplete) —
  # never user intent. Point at your smallest/cheapest model. If unset, the
  # router reuses `fast`, then `default_model`.
  utility:   null
  none:      null
