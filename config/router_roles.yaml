# LLMSpaghetti Router — Role → Model mapping
# Managed by the Routing panel. Edit with: spag config
#
# Model names must match model_name entries in litellm_config.yaml.
# Set a role to "local-default" to use your default local Ollama model.
# Set a role to null to exclude it from auto-routing (direct calls only).
#
# Routing modes:
#   auto   — classify each message and pick the right model automatically
#   single — bypass classification, send every message to single_model

mode: "auto"
single_model: null

# Append "↳ LLMSpaghetti → <model> · <role>" to every reply (visible footer + a
# machine-readable x_llmspaghetti field). Core "show your work" principle —
# leave it on unless you have a reason not to. Set false to hide the tag.
show_provenance: true

roles:
  image:     "local-default"
  code:      "local-default"
  reasoning: "local-default"
  fast:      "local-default"
  document:  "local-default"
  general:   "local-default"
  # Housekeeping (chat titles, tags, follow-up suggestions, autocomplete) —
  # never user intent. Point at your smallest/cheapest model. If unset, the
  # router reuses `fast`, then `local-default`.
  utility:   "local-default"
  none:      null
