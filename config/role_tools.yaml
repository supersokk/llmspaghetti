# LLMSpaghetti — MCP tools enabled per routing role
# Managed by the Routing → Tools panel.
#
# Available tools: filesystem, memory, fetch, brave-search, github, sqlite, postgres
# Most tools must be installed (Services → MCP Tools) before use. EXCEPTION: `fetch`
# is BUILT IN — the router retrieves the URL itself, so it needs no install; just
# enable it on a tool-capable role. It gives a model live web content (its biggest
# lift over stale training data).
#
# OPT-IN BY DESIGN: tools are OFF for every role by default. Injecting a tool into
# a role means EVERY message routed there goes to the model WITH that tool — which
# small local models (e.g. 7B) often mishandle, emitting a tool call as plain text
# or rambling about it even for a simple "hi". Enable tools only for a role you
# point at a tool-capable model, from the Routing → Tools panel.
#
# Tools also force that role's requests non-streaming (needed to resolve the call)
# and add latency — another reason to keep `fast`/`general` tool-free.

